{% extends "instagram/base.html" %}

{% block content %}
<div class="app-shell">
    {% include "instagram/components/_sidebar.html" %}

    <main class="utility-layout">
        <section class="utility-panel wide">
            <h1>Pirostagram</h1>
            <h2>"{{ query }}"로 검색한 결과</h2>
            <form class="search-form" action="{% url 'instagram:user_search' %}" method="get">
                <input type="search" name="q" value="{{ query }}" placeholder="아이디 또는 이름 검색" aria-label="유저 검색어">
                <button type="submit">검색</button>
            </form>

            <div class="user-result-list">
                {% for user in search_users %}
                    {% include "instagram/components/_user_result_card.html" %}
                {% endfor %}
            </div>
        </section>
    </main>
</div>
{% endblock %}
