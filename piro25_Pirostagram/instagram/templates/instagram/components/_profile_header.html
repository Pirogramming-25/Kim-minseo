<section class="profile-header">
    <div class="profile-top">
        <form class="profile-photo-form" method="post" action="{% url 'instagram:profile_avatar_update' %}" enctype="multipart/form-data">
            {% csrf_token %}
            <label class="profile-photo profile-photo-upload" aria-label="프로필 사진 추가">
                {% if profile.avatar_url %}
                    <img src="{{ profile.avatar_url }}" alt="{{ profile.username }} 프로필 사진">
                {% else %}
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z"></path>
                        <path d="M9 2 7.2 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3.2L15 2H9Zm3 15a5 5 0 1 1 0-10 5 5 0 0 1 0 10Z"></path>
                    </svg>
                {% endif %}
                <span class="profile-photo-hint">사진 변경</span>
                <input type="file" name="avatar" accept="image/*" data-auto-upload>
            </label>
        </form>

        <div class="profile-info">
            <h1>{{ profile.username }}</h1>
            <strong>{{ profile.name }}</strong>

            <dl class="profile-stats">
                <div>
                    <dt>{{ profile.post_count }}</dt>
                    <dd>게시물</dd>
                </div>
                <div>
                    <dt>{{ profile.followers }}</dt>
                    <dd>팔로워</dd>
                </div>
                <div>
                    <dt>{{ profile.following }}</dt>
                    <dd>팔로우</dd>
                </div>
            </dl>
        </div>
    </div>

    <button class="profile-edit-button" type="button">프로필 편집</button>
</section>
