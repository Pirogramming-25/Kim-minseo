<form class="sort-bar" action="{% url 'instagram:post_search' %}" method="get" data-auto-submit>
    <label for="post-sort">게시글 정렬 기준:</label>
    <select id="post-sort" name="sort">
        {% for option in sort_options %}
            <option value="{{ option.value }}">{{ option.label }}</option>
        {% endfor %}
    </select>
</form>
