<div class="story-modal" data-story-modal hidden>
    <div class="story-backdrop" data-story-close></div>
    <section class="story-dialog" role="dialog" aria-modal="true" aria-label="스토리 감상">
        <button class="story-close" type="button" data-story-close aria-label="스토리 닫기">×</button>
        <div class="story-progress" aria-hidden="true">
            <span data-story-progress></span>
        </div>
        <button class="story-arrow prev" type="button" data-story-prev aria-label="이전 스토리">‹</button>
        <div class="story-slide">
            <div class="story-photo-frame" data-story-photo>
                <a class="story-photo-header" href="#" data-story-profile-link>
                    <span class="story-photo-dot"></span>
                    <strong data-story-title>스토리</strong>
                </a>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <path d="M21 16 16 11 5 21"></path>
                </svg>
            </div>
            <p data-story-caption>사진이 자동으로 넘어갑니다.</p>
        </div>
        <button class="story-arrow next" type="button" data-story-next aria-label="다음 스토리">›</button>
    </section>
</div>
