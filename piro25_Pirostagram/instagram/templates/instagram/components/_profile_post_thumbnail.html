<article class="profile-post-thumbnail" aria-label="게시물 {{ profile_post.id }}">
    {% if profile_post.image_url %}
        <img src="{{ profile_post.image_url }}" alt="게시물 {{ profile_post.id }}">
    {% else %}
    <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="2"></rect>
        <circle cx="8.5" cy="8.5" r="1.5"></circle>
        <path d="M21 16 16 11 5 21"></path>
    </svg>
    {% endif %}
</article>
