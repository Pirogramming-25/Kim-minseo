{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idea Archive</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{% url 'ideas:idea_list' %}">Idea<span>Archive</span></a>
    <nav class="nav-links" aria-label="주요 메뉴">
      <a href="{% url 'ideas:idea_create' %}">아이디어 등록</a>
      <a href="{% url 'ideas:idea_list' %}">아이디어 관리</a>
      <a href="{% url 'ideas:devtool_create' %}">개발툴 등록</a>
      <a href="{% url 'ideas:devtool_list' %}">개발툴 관리</a>
      {% if request.user.is_authenticated %}
        <a href="{% url 'accounts:mypage' %}">마이페이지</a>
        <form class="logout-form" method="post" action="{% url 'accounts:logout' %}">
          {% csrf_token %}
          <button type="submit">로그아웃</button>
        </form>
      {% else %}
        <a href="{% url 'accounts:signup' %}">회원가입</a>
        <a href="{% url 'accounts:login' %}">로그인</a>
      {% endif %}
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
