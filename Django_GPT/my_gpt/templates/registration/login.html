{% extends "my_gpt/base.html" %}

{% block title %}
로그인 | Django GPT
{% endblock %}

{% block content %}
<section class="login-card">
  <h1>로그인</h1>

  {% if request.GET.required == "1" %}
    <script>
      alert("로그인 후 이용해주세요");
    </script>
  {% endif %}

  {% if form.errors %}
    <p class="error-message">
      아이디 또는 비밀번호를 확인해주세요.
    </p>
  {% endif %}

  <form method="post">
    {% csrf_token %}

    <input
      type="hidden"
      name="next"
      value="{{ next }}"
    >

    <div class="form-group">
      <label for="{{ form.username.id_for_label }}">
        아이디
      </label>

      {{ form.username }}
    </div>

    <div class="form-group">
      <label for="{{ form.password.id_for_label }}">
        비밀번호
      </label>

      {{ form.password }}
    </div>

    <button
      type="submit"
      class="primary-button"
    >
      로그인
    </button>
  </form>
</section>
{% endblock %}
